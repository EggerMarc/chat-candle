<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>chat-candle · in-browser inference</title>
    <style>
      body { font: 15px/1.5 system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
      h1 { font-size: 1.3rem; }
      label { display: block; margin: 0.6rem 0 0.2rem; font-weight: 600; }
      input[type="text"], textarea { width: 100%; box-sizing: border-box; padding: 0.4rem; }
      button { margin-top: 0.8rem; padding: 0.5rem 1rem; }
      #out { white-space: pre-wrap; background: #f4f4f4; padding: 1rem; border-radius: 6px; margin-top: 1rem; min-height: 3rem; }
      .muted { color: #777; font-size: 0.85rem; }
    </style>
  </head>
  <body>
    <h1>chat-candle — local inference in the browser (wasm + candle CPU)</h1>
    <p class="muted">
      Pick a quantized GGUF (e.g. <code>Qwen3-0.6B-Q4_K_M.gguf</code>) and its
      <code>tokenizer.json</code>. Everything runs locally; nothing is uploaded.
      Note: candle's wasm backend is CPU-only today, so expect a low tok/s — this
      proves the pipeline, not the speed.
    </p>

    <label>GGUF weights (.gguf)</label>
    <input type="file" id="gguf" accept=".gguf" />

    <label>tokenizer.json</label>
    <input type="file" id="tok" accept=".json,application/json" />

    <label>Prompt</label>
    <textarea id="prompt" rows="2">What is the capital of France?</textarea>

    <button id="run" disabled>Load model & generate</button>
    <span id="status" class="muted"></span>

    <div id="out"></div>

    <script type="module">
      import init, { LocalChat } from "./pkg/chat_candle.js";

      const $ = (id) => document.getElementById(id);
      const status = (s) => ($("status").textContent = s);
      let chat = null;

      await init();
      $("run").disabled = false;

      async function bytes(input) {
        const f = input.files[0];
        if (!f) throw new Error("pick a file");
        return new Uint8Array(await f.arrayBuffer());
      }

      $("run").addEventListener("click", async () => {
        try {
          $("run").disabled = true;
          $("out").textContent = "";
          if (!chat) {
            status("loading model…");
            const [g, t] = [await bytes($("gguf")), await bytes($("tok"))];
            const t0 = performance.now();
            chat = new LocalChat(g, t);
            status(`model ready in ${((performance.now() - t0) / 1000).toFixed(1)}s`);
          }
          status("generating…");
          const t0 = performance.now();
          let n = 0;
          chat.generate($("prompt").value, undefined, 64, 0.0, (piece) => {
            $("out").textContent += piece;
            n++;
          });
          const dt = (performance.now() - t0) / 1000;
          status(`done — ${n} tokens in ${dt.toFixed(1)}s (${(n / dt).toFixed(1)} tok/s)`);
        } catch (e) {
          status("error: " + e);
        } finally {
          $("run").disabled = false;
        }
      });
    </script>
  </body>
</html>
